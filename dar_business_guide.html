
<style>
  * { box-sizing: border-box; }
  .biz-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 14px; padding: 1rem 0; }
  .biz-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.1rem; cursor: pointer; transition: border-color .2s; }
  .biz-card:hover { border-color: var(--color-border-primary); }
  .biz-card.active { border: 1.5px solid var(--color-border-info); }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .biz-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 2px; }
  .biz-type { font-size: 11px; color: var(--color-text-secondary); }
  .badge { font-size: 11px; font-weight: 500; padding: 3px 9px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
  .easy { background: #EAF3DE; color: #3B6D11; }
  .intermediate { background: #FAEEDA; color: #633806; }
  .hard { background: #FAECE7; color: #4A1B0C; }
  .biz-meta { display: flex; gap: 8px; margin: 10px 0 8px; flex-wrap: wrap; }
  .meta-pill { font-size: 11px; background: var(--color-background-secondary); color: var(--color-text-secondary); padding: 3px 8px; border-radius: 99px; }
  .biz-desc { font-size: 13px; color: var(--color-text-secondary); line-height: 1.55; margin: 0; }
  .detail-panel { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem 1.2rem; margin: 0 0 1rem; border: 0.5px solid var(--color-border-tertiary); }
  .detail-panel h3 { font-size: 15px; font-weight: 500; margin: 0 0 10px; color: var(--color-text-primary); }
  .detail-row { display: flex; gap: 8px; margin-bottom: 7px; font-size: 13px; align-items: flex-start; }
  .detail-label { color: var(--color-text-secondary); min-width: 110px; flex-shrink: 0; }
  .detail-val { color: var(--color-text-primary); }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .filter-btn { font-size: 12px; padding: 5px 14px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; transition: background .15s; }
  .filter-btn.active, .filter-btn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .section-label { font-size: 12px; color: var(--color-text-secondary); font-weight: 500; margin: 0 0 8px; letter-spacing: .04em; text-transform: uppercase; }
  .steps-list { list-style: none; margin: 0; padding: 0; counter-reset: s; }
  .steps-list li { counter-increment: s; display: flex; gap: 10px; margin-bottom: 7px; font-size: 13px; color: var(--color-text-primary); }
  .steps-list li::before { content: counter(s); min-width: 20px; height: 20px; border-radius: 50%; background: var(--color-background-info); color: var(--color-text-info); font-size: 11px; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .prompt-btn { font-size: 12px; padding: 6px 14px; border-radius: 99px; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; margin-top: 10px; }
  .prompt-btn:hover { background: var(--color-background-secondary); }
</style>

<div class="section-label">Filter by difficulty</div>

<div id="detail-area"></div>

let currentFilter = 'all';
let activeId = null;

function filterCards(level, btn) {
  currentFilter = level;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards();
  document.getElementById('detail-area').innerHTML = '';
  activeId = null;
}

function renderCards() {
  const grid = document.getElementById('biz-grid');
  const filtered = currentFilter === 'all' ? businesses : businesses.filter(b => b.level === currentFilter);
  grid.innerHTML = filtered.map(b => `
    <div class="biz-card${activeId === b.id ? ' active' : ''}" id="card-${b.id}" onclick="showDetail(${b.id})">
      <div class="card-top">
        <div>
          <p class="biz-name">${b.name}</p>
          <span class="biz-type">${b.type}</span>
        </div>
        <span class="badge ${b.level}">${b.level.charAt(0).toUpperCase()+b.level.slice(1)}</span>
      </div>
      <div class="biz-meta">
        <span class="meta-pill">Capital: ${b.capital}</span>
        <span class="meta-pill">${b.income}</span>
      </div>
      <p class="biz-desc">${b.desc}</p>
    </div>
  `).join('');
}

function showDetail(id) {
  const b = businesses.find(x => x.id === id);
  activeId = id;
  renderCards();
  const area = document.getElementById('detail-area');
  area.innerHTML = `
    <div class="detail-panel">
      <h3>${b.name} — how to start in Dar es Salaam</h3>
      <div class="detail-row"><span class="detail-label">Difficulty</span><span class="detail-val"><span class="badge ${b.level}" style="font-size:12px">${b.level.charAt(0).toUpperCase()+b.level.slice(1)}</span></span></div>
      <div class="detail-row"><span class="detail-label">Starting capital</span><span class="detail-val">${b.capital}</span></div>
      <div class="detail-row"><span class="detail-label">Time to launch</span><span class="detail-val">${b.timeline}</span></div>
      <div class="detail-row"><span class="detail-label">Income potential</span><span class="detail-val">${b.income}</span></div>
      <div class="detail-row" style="margin-top:10px"><span class="detail-label" style="font-weight:500">Dar-specific tip</span><span class="detail-val" style="font-style:italic">${b.tips}</span></div>
      <div style="margin-top:14px">
        <div class="section-label">Steps to start</div>
        <ol class="steps-list">${b.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
      </div>
      <button class="prompt-btn" onclick="sendPrompt('Give me a full launch plan for ${b.name} in Dar es Salaam, including where to source, how to market, and realistic month 1–6 projections')">Get full launch plan ↗</button>
    </div>
  `;
  area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

renderCards();
